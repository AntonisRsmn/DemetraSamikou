<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Demetra Samikou</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Berkshire+Swash&family=Great+Vibes&family=Cormorant+Garamond:wght@400;500;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --champagne: #F2E5C6;
            --almond: #EFD4C4;
            --pink-pearl: #E2B3C2;
            --deep-puce: #AC5B67;
            --antique-ruby: #781727;
            --dark-maroon: #560B18;
            --deep-wine: #3B010B;
            --off-white: #FDF8F4;
            --text-dark: #2D1A1A;
            --text-medium: #5C3A3A;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--off-white);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
        }

        .login-card {
            background: white;
            border-radius: 16px;
            padding: 48px 40px;
            box-shadow: 0 4px 24px rgba(120, 23, 39, 0.08);
        }

        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-logo img {
            height: 60px;
            margin: 0 auto;
        }

        .login-logo h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.3rem;
            font-weight: 500;
            color: var(--text-medium);
            margin-top: 12px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-medium);
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--almond);
            border-radius: 8px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            color: var(--text-dark);
            background: var(--off-white);
            outline: none;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .form-group input:focus {
            border-color: var(--antique-ruby);
            box-shadow: 0 0 0 3px rgba(120, 23, 39, 0.08);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background-color: var(--antique-ruby);
            color: white;
            border: none;
            border-radius: 8px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
            margin-top: 8px;
        }

        .login-btn:hover {
            background-color: var(--dark-maroon);
            transform: translateY(-1px);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background-color: #FEF2F2;
            border: 1px solid #FECACA;
            color: #991B1B;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.82rem;
            margin-bottom: 20px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .locked-message {
            background-color: #FEF3CD;
            border: 1px solid #F9DC5C;
            color: #856404;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.82rem;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }

        .locked-message.show {
            display: block;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 24px;
            color: var(--text-medium);
            font-size: 0.82rem;
            text-decoration: none;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: var(--antique-ruby);
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 36px 24px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <img src="/Logo.png" alt="Demetra Samikou">
                <h2>Admin Panel</h2>
            </div>

            <div class="error-message" id="errorMessage"></div>
            <div class="locked-message" id="lockedMessage"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required autocomplete="email" maxlength="100" placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password" maxlength="128">
                </div>
                <button type="submit" class="login-btn" id="loginBtn">Sign In</button>
            </form>

            <a href="/" class="back-link">← Back to website</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const errorEl = document.getElementById('errorMessage');
        const lockedEl = document.getElementById('lockedMessage');
        const loginBtn = document.getElementById('loginBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorEl.classList.remove('show');
            lockedEl.classList.remove('show');
            loginBtn.disabled = true;
            loginBtn.textContent = 'Signing in...';

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                errorEl.textContent = 'Please fill in all fields.';
                errorEl.classList.add('show');
                loginBtn.disabled = false;
                loginBtn.textContent = 'Sign In';
                return;
            }

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (res.ok) {
                    window.location.href = '/admin';
                } else if (res.status === 429) {
                    lockedEl.textContent = data.message || 'Too many failed attempts. Please try again later.';
                    lockedEl.classList.add('show');
                    loginBtn.disabled = true;
                    // Re-enable after lockout
                    if (data.retryAfter) {
                        setTimeout(() => {
                            loginBtn.disabled = false;
                            loginBtn.textContent = 'Sign In';
                            lockedEl.classList.remove('show');
                        }, data.retryAfter * 1000);
                    }
                } else {
                    errorEl.textContent = data.message || 'Invalid credentials.';
                    errorEl.classList.add('show');
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Sign In';
                }
            } catch (err) {
                errorEl.textContent = 'Connection error. Please try again.';
                errorEl.classList.add('show');
                loginBtn.disabled = false;
                loginBtn.textContent = 'Sign In';
            }
        });
    </script>
</body>
</html>
